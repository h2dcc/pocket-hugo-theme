# Base URL for production. Replace this before deployment.
baseURL = "https://example.org/"

# Site title shown in the header, browser title, and feeds.
title = "Pocket Hugo"

# Theme folder name.
theme = "pocket-hugo-theme"

# Default language for the site.
languageCode = "en"
defaultContentLanguage = "en"

# Enable CJK-aware word counting for Chinese, Japanese, and Korean text.
hasCJKLanguage = true

# Generate robots.txt automatically.
enableRobotsTXT = true

# Main content sections used by homepage lists and archives.
mainSections = ["posts"]

# Footer copyright text shown after the current year.
copyright = "MIT licensed demo content"

# Talks JSON feed media type.
[mediaTypes."application/feed+json"]
  suffixes = ["json"]

# RSS output for the talks page.
[outputFormats.TalksRSS]
  mediaType = "application/rss+xml"
  baseName = "talks"
  isPlainText = false
  notAlternative = true

# JSON output for the talks page.
[outputFormats.TalksJSON]
  mediaType = "application/feed+json"
  baseName = "talks"
  isPlainText = true
  notAlternative = true

# Posts per page.
[pagination]
  pagerSize = 8

# RSS item count.
[services.rss]
  limit = 10

# URL patterns.
[permalinks]
  posts = "/article/:slug/"
  page = "/:slug/"

# Taxonomies.
[taxonomies]
  tag = "tags"
  category = "categories"

# English language settings.
[languages.en]
  languageName = "English"
  title = "Pocket Hugo"
  weight = 1

[languages.en.params.sidebar]
  subtitle = "A cover-driven theme for long-term personal writing"

# Chinese language settings.
[languages.zh-cn]
  languageName = "Chinese"
  title = "Pocket Hugo"
  weight = 2

[languages.zh-cn.params.sidebar]
  subtitle = "一款适合个人长期写作的图文式主题"

# Japanese language settings.
[languages.ja]
  languageName = "Japanese"
  title = "Pocket Hugo"
  weight = 3

[languages.ja.params.sidebar]
  subtitle = "長く書き続けるための、図文中心の個人向けテーマ"
# Spanish language settings.
[languages.es]
  languageName = "Spanish"
  title = "Pocket Hugo"
  weight = 4

[languages.es.params.sidebar]
  subtitle = "Un tema visual para la escritura personal a largo plazo"

# French language settings.
[languages.fr]
  languageName = "French"
  title = "Pocket Hugo"
  weight = 5

[languages.fr.params.sidebar]
  subtitle = "Un thème visuel pour une écriture personnelle au long cours"
  
