# Theme options.
[params]
  featuredImageField = "image"
  favicon = "/img/logo-default.svg"
  appleTouchIcon = "/img/avatar.webp"
  summaryLength = 0
  articleWords = false
  backToTop = false

  [params.footer]
    since = 2026

  [params.dateFormat]
    published = "2006-01-02"
    lastUpdated = "2006-01-02"

  [params.sidebar]
    subtitle = "A cover-driven theme for long-term personal writing"

    [params.sidebar.avatar]
      enabled = true
      local = true
      src = "img/avatar.webp"

    [params.sidebar.qr]
      enabled = false
      # image = "img/your-qr.png"
      # alt = "Scan me"
      # width = 110
      # height = 110

  [params.article]
    toc = true
    readingTime = true

  [params.languageSwitcher]
    # Show a select box in the header when available languages reach this count.
    headerSelectThreshold = 3

  [params.comments]
    # Enable comments globally.
    enabled = false
    # Supported providers: "giscus" or "twikoo".
    provider = "giscus"

    [params.comments.giscus]
      # repo = "owner/repo"
      # repoId = "..."
      # category = "Announcements"
      # categoryId = "..."
      mapping = "pathname"
      strict = "0"
      reactionsEnabled = "1"
      emitMetadata = "0"
      inputPosition = "top"
      theme = "preferred_color_scheme"
      # lang = "en"

    [params.comments.twikoo]
      # envId = "https://your-service.example.com"
      # region = ""
      # lang = "en-US"
      # path = ""

  [params.colorScheme]
    toggle = true
    default = "auto"

  [params.widgets]
    homepage = [
      { type = "search", params = { limit = 0 } },
      { type = "archives", params = { limit = 3 } },
      { type = "categories", params = { limit = 10 } },
      { type = "tag-cloud", params = { limit = 20 } }
    ]
    static = [
      { type = "search", params = { limit = 0 } },
      { type = "archives", params = { limit = 3 } },
      { type = "categories", params = { limit = 10 } },
      { type = "tag-cloud", params = { limit = 20 } }
    ]
    page = [
      { type = "toc" }
    ]

    [params.widgets.titleVisibility]
      archives = true
      categories = true
      related = true
      search = true
      tagCloud = true
      toc = true

  [[params.social]]
  name = "GitHub"
  url = "https://github.com/h2dcc/pocket-hugo-theme"
  icon = "brand-github"

  [[params.social]]
  name = "Facebook"
  url = "https://www.facebook.com/"
  icon = "brand-facebook"

  [[params.social]]
  name = "Twitter"
  url = "https://twitter.com/"
  icon = "brand-twitter"

  [[params.social]]
  name = "RSS"
  url = "/index.xml"
  icon = "rss"

[related]
  includeNewer = true
  threshold = 1
  toLower = false

  [[related.indices]]
    name = "tags"
    weight = 200

  [[related.indices]]
    name = "categories"
    weight = 100

# Markdown rendering options.
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = true

  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = false
    tabWidth = 4