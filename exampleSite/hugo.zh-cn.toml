# 站点部署地址。正式上线前请替换成你自己的域名。
baseURL = "https://example.org/"

# 网站标题，会显示在页头、浏览器标题和订阅信息里。
title = "Pocket Hugo"

# 主题目录名称。
theme = "pocket-hugo-theme"

# 站点默认语言。
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"

# 启用中日韩文字计数优化。
hasCJKLanguage = true

# 自动生成 robots.txt。
enableRobotsTXT = true

# 首页和归档页默认读取的主要内容分区。
mainSections = ["posts"]

# 页脚版权文字，会显示在当前年份之后。
copyright = "MIT licensed demo content"

# 说说页面 JSON feed 的媒体类型。
[mediaTypes."application/feed+json"]
  suffixes = ["json"]

# 说说页面的 RSS 输出。
[outputFormats.TalksRSS]
  mediaType = "application/rss+xml"
  baseName = "talks"
  isPlainText = false
  notAlternative = true

# 说说页面的 JSON 输出。
[outputFormats.TalksJSON]
  mediaType = "application/feed+json"
  baseName = "talks"
  isPlainText = true
  notAlternative = true

# 分页大小。
[pagination]
  pagerSize = 8

# RSS 输出条数。
[services.rss]
  limit = 10

# URL 规则。
[permalinks]
  posts = "/article/:slug/"
  page = "/:slug/"
  talks = "/talks/:slug/"

# 多语言配置。
[languages]
  [languages.zh-cn]
    languageName = "简体中文"
    languageCode = "zh-CN"
    weight = 1
    title = "Pocket Hugo"
    contentDir = "content"

    [languages.zh-cn.params]
      description = "一款适合个人长期写作的图文式主题"
      subtitle = "一款适合个人长期写作的图文式主题"
      keywords = ["Hugo", "theme", "writing", "multilingual"]
      author = "Pocket Hugo"

  [languages.en]
    languageName = "English"
    languageCode = "en-US"
    weight = 2
    title = "Pocket Hugo"
    contentDir = "content"

    [languages.en.params]
      description = "A cover-driven theme for long-term personal writing"
      subtitle = "A cover-driven theme for long-term personal writing"
      keywords = ["Hugo", "theme", "writing", "multilingual"]
      author = "Pocket Hugo"


# 站点级参数。
[params]
  # 默认头像，建议放在 static/img/ 目录下。
  avatar = "img/avatar.webp"

  # 默认 logo，可用于站点角标或浏览器图标。
  logo = "img/logo-default.svg"

  # 作者名称。
  author = "Pocket Hugo"

  # 页脚年份，可用于手动指定开始年份。
  since = 2026

  # 是否启用彩色主题切换。
  colorSchemeToggle = true

  # 显示在首页顶部的简介。
  intro = "A cover-driven theme for long-term personal writing"

  # 站点备案或额外页脚说明。
  footer = "Built with Hugo"

  # 首页卡片默认摘要长度。
  # 设为 0 表示不截断，摘要会完整显示，不是“长度为 0”。
  summaryLength = 0

  [params.extensions]
      # Mermaid 默认不建议全站启用，因为它还会额外加载 JavaScript。
      # 如果要在某一篇文章中使用，先在这里开启，再在该文章 front matter
      # 中添加 `extensions = ["mermaid"]`。
      mermaid = false
      # KaTeX 默认不建议全站启用，因为它也会额外加载 JavaScript。
      # 如果要在某一篇文章中使用，先在这里开启，再在该文章 front matter
      # 中添加 `extensions = ["katex"]`。
      katex = false

  [params.search]
      # 搜索提供方，当前使用内置 JSON 搜索。
      provider = "local"
      # 是否把正文全文也写入搜索索引。
      fullText = false

  [params.seo]
      # 可选站点副标题，可用于标题结构。
      tagline = "一款适合个人长期写作的图文式主题"
      # 首页元描述，用于搜索引擎和社交平台摘要。
      homeDescription = "Pocket Hugo Theme 是一款适合长文写作、说说流、友链页与多语言个人站的图文式 Hugo 主题。"
      # SEO 描述的最大长度。
      descriptionLength = 180
      # 页面标题结构中使用的分隔符。
      separator = " · "

      [params.seo.title]
        # 可用占位符：
        # [site_name] [tagline] [separator]
        # [post_title] [page_title] [group_title] [archive_title]
        home = "[site_name]"
        post = "[post_title][separator][site_name]"
        page = "[page_title][separator][site_name]"
        group = "[group_title][separator][site_name]"
        archive = "[archive_title][separator][site_name]"

  [params.alpine]
      # 是否全局加载 Alpine.js，方便自定义轻交互小组件。
      enabled = true

  # 是否在文章页显示预计阅读时长。
  readingTime = true

  # 是否显示文章字数统计。
  articleWords = true

  [params.article]
      # 是否启用 backlinks 反链。
      backlinks = true
      # 反链最多展示多少条。
      backlinksLimit = 5
      # 列表页是否显示摘要。
      # 这里只影响首页、归档、分类、标签等文章卡片。
      showListSummary = true
      # 首页、分类、标签、归档等列表页里，渐变卡片是否显示外部标题。
      listTitle = true
      # 文章页标题下方是否显示 description。
      # 这里只影响文章内页本身，不影响首页和列表页摘要。
      showPageDescription = true
      # 是否显示文章目录。
      toc = true
      # 是否显示预计阅读时长。
      readingTime = true

  [params.images.cover]
        # 列表页封面是否使用 Hugo Fill 裁切。
        # 设为 false 时会尽量保留原图，不再生成裁切后的封面。
        useFill = false
        # 首页和文章卡片封面使用的 Hugo Fill 规格。
        cardFill = "640x300 Center q85"
        # 分类、标签等列表页封面使用的 Hugo Fill 规格。
        taxonomyFill = "640x300 Center q85"
        # og:image 和 twitter:image 使用的封面变体，常用 card 或 single。
        openGraphVariant = "card"
        # 当文章没有设置封面图时，是否启用默认封面。
        useDefault = true
        # "image" 使用 default-cover，"gradient" 渲染自动生成的渐变标题卡片。
        fallbackMode = "gradient"
        # 当页面没有封面图时，社交分享图是否仍回退到 default-cover。
        openGraphUseDefault = true
        # 当 fallbackMode = "image" 时使用的默认封面图地址，可写本地路径或远程链接。
        default = "/img/default-cover.webp"

  [params.images.content]
    # 是否启用正文图片限高逻辑。
    enableMaxHeight = true
    # 是否一键统一手机、平板、桌面三端高度。
    limitHeight = false
    # 开启统一高度后使用的值。
    unifiedMaxHeight = "320px"
    # 正文图片在不同端上的显示高度阈值。
    mobileMaxHeight = "160px"
    tabletMaxHeight = "250px"
    desktopMaxHeight = "350px"
    # 当正文图片被判定为 full-width 时使用的 object-fit 策略。
    fullWidthFit = "cover"

  [params.images.brightness]
    # 浅色模式下图片的 CSS brightness() 值。
    light = "1"
    # 深色模式下图片的 CSS brightness() 值。
    dark = "0.85"

  [params.images.pipeline]
    # 是否启用 Hugo 原生响应式图像派生。
    responsive = true
    # 统一输出格式，默认转成 webp。
    format = "webp"
    # 图像质量。
    quality = 85
    # 封面图派生宽度。
    coverWidths = [480, 720, 960, 1280]
    # 正文图派生宽度。
    contentWidths = [640, 960, 1400]

  # 是否启用返回顶部按钮。
  backToTop = true

  # 是否启用图片灯箱。
  fancybox = true

  # 是否启用说说页面。
  enableTalks = true

  # 自定义二维码图片，留空则不显示。
  qrcode = ""

  # 语言切换选项。
  [params.languageSwitcher]
    # 站点只设置两种语言时，显示直接切换图标；多于两种时，显示下拉列表。
    headerSelectThreshold = 2

  # 评论系统选项。
  [params.comments]
      # 是否全局启用评论。
      enabled = true
      # 支持的评论提供方："giscus"、"twikoo" 或 "custom"。
      provider = "twikoo"

    [params.comments.giscus]
      # repo = "owner/repo"
      # repoId = "..."
      # category = "Announcements"
      # categoryId = "..."
      mapping = "pathname"
      strict = "0"
      reactionsEnabled = "1"
      emitMetadata = "0"
      inputPosition = "top"
      theme = "preferred_color_scheme"
      # lang = "zh-CN"`r`n      # jsUrl = "https://giscus.app/client.js"

    [params.comments.twikoo]
      # envId = "https://twikoo.fosu.cc"
      # region = ""
      # lang = "en"
      # path = ""`r`n      # jsUrl = "https://cdn.jsdelivr.net/npm/twikoo@1.6.41/dist/twikoo.all.min.js"
# 首页社交链接。
[[params.social]]
name = "GitHub"
url = "https://github.com/h2dcc/pocket-hugo-theme"
icon = "brand-github"

[[params.social]]
name = "Facebook"
url = "https://www.facebook.com/"
icon = "brand-facebook"

[[params.social]]
name = "Twitter"
url = "https://twitter.com/"
icon = "brand-twitter"

[[params.social]]
name = "RSS"
url = "/index.xml"
icon = "rss"

[params.widgets]
  # 首页右边栏组件顺序。
  homepage = ["search", "archives", "categories", "tag-cloud"]

  # 静态页面右边栏组件顺序。
  static = ["search", "archives", "categories", "tag-cloud"]

  # 文章页右边栏组件顺序。
  page = ["toc", "search", "related", "archives", "categories", "tag-cloud"]

  [params.widgets.titleVisibility]
    # 是否显示目录组件标题。
    toc = true
    # 是否显示搜索组件标题。
    search = true
    # 是否显示相关文章标题。
    related = true
    # 是否显示归档标题。
    archives = true
    # 是否显示分类标题。
    categories = true
    # 是否显示标签云标题。
    tagCloud = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

# 首页输出 HTML、RSS 和 JSON，便于搜索与前端脚本使用。
[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]
  page = ["HTML"]
