    [languages.ja.params]
      description = "長く書き続けるための、図文中心の個人向けテーマ"
      subtitle = "适合长期个人写作的图文式主题"
      keywords = ["Hugo", "theme", "writing", "multilingual"]
      author = "Pocket Hugo"
  [languages.es]
    languageName = "Spanish"
    languageCode = "es-ES"
    weight = 4
    title = "Pocket Notes Español"
    contentDir = "content"

    [languages.es.params]
      description = "Un tema visual para la escritura personal a largo plazo"
      subtitle = "Un tema visual para la escritura personal a largo plazo"
      keywords = ["Hugo", "theme", "writing", "multilingual"]
      author = "Pocket Hugo"

  [languages.fr]
    languageName = "French"
