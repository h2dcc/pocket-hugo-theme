# 站点级参数。
[params]
  # 默认头像，建议放在 static/img/ 目录下。
  avatar = "img/avatar.webp"

  # 默认 logo，可用于站点角标或浏览器图标。
  logo = "img/logo-default.svg"

  # 作者名称。
  author = "Pocket Hugo"

  # 页脚年份，可用于手动指定开始年份。
  since = 2026

  # 是否启用彩色主题切换。
  colorSchemeToggle = true

  # 显示在首页顶部的简介。
  intro = "A cover-driven theme for long-term personal writing"

  # 站点备案或额外页脚说明。
  footer = "Built with Hugo"

  # 首页卡片默认摘要长度。
  summaryLength = 0

  # 是否在文章页显示预计阅读时长。
  readingTime = true

  # 是否显示文章字数统计。
  articleWords = false

  # 是否启用返回顶部按钮。
  backToTop = false

  # 是否启用图片灯箱。
  fancybox = false

  # 是否启用说说页面。
  enableTalks = true

  # 自定义二维码图片，留空则不显示。
  qrcode = ""

  # 语言切换选项。
  [params.languageSwitcher]
    # 当可切换语言达到这个数量时，在顶部语言图标旁显示下拉选择框。
    headerSelectThreshold = 3

  # 评论系统选项。
  [params.comments]
    # 是否全局启用评论。
    enabled = false
    # 支持的评论提供方："giscus" 或 "twikoo"。
    provider = "giscus"

    [params.comments.giscus]
      # repo = "owner/repo"
      # repoId = "..."
      # category = "Announcements"
      # categoryId = "..."
      mapping = "pathname"
      strict = "0"
      reactionsEnabled = "1"
      emitMetadata = "0"
      inputPosition = "top"
      theme = "preferred_color_scheme"
      # lang = "zh-CN"

    [params.comments.twikoo]
      # envId = "https://your-service.example.com"
      # region = ""
      # lang = "zh-CN"
      # path = ""
# 首页社交链接。
[[params.social]]
name = "GitHub"
url = "https://github.com/h2dcc/pocket-hugo-theme"
icon = "brand-github"

[[params.social]]
name = "Facebook"
url = "https://www.facebook.com/"
icon = "brand-facebook"

[[params.social]]
name = "Twitter"
url = "https://twitter.com/"
icon = "brand-twitter"

[[params.social]]
name = "RSS"
url = "/index.xml"
icon = "rss"

[params.widgets]
  # 首页右边栏组件顺序。
  homepage = ["search", "archives", "categories", "tag-cloud"]

  # 静态页面右边栏组件顺序。
  static = ["search", "archives", "categories", "tag-cloud"]

  # 文章页右边栏组件顺序。
  page = ["toc", "search", "related", "archives", "categories", "tag-cloud"]

  [params.widgets.titleVisibility]
    # 是否显示目录组件标题。
    toc = true
    # 是否显示搜索组件标题。
    search = true
    # 是否显示相关文章标题。
    related = true
    # 是否显示归档标题。
    archives = true
    # 是否显示分类标题。
    categories = true
    # 是否显示标签云标题。
    tagCloud = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

# 首页输出 HTML、RSS 和 JSON，便于搜索与前端脚本使用。
[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]
  page = ["HTML"]