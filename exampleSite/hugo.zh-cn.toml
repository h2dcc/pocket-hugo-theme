    weight = 5
    title = "Pocket Notes Français"
    contentDir = "content"

    [languages.fr.params]
      description = "Un thème visuel pour une écriture personnelle au long cours"
      subtitle = "Un thème visuel pour une écriture personnelle au long cours"
      keywords = ["Hugo", "theme", "writing", "multilingual"]
      author = "Pocket Hugo"
