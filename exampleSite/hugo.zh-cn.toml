# 站点部署地址。正式上线前请替换成你自己的域名。
baseURL = "https://example.org/"

# 网站标题，会显示在页头、浏览器标题和订阅信息里。
title = "Pocket Notes"

# 主题目录名称。
theme = "pocket-hugo-theme"

# 站点默认语言。
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"

# 启用中日韩文字计数优化。
hasCJKLanguage = true

# 自动生成 robots.txt。
enableRobotsTXT = true

# 首页和归档页默认读取的主要内容分区。
mainSections = ["posts"]

# 页脚版权文字，会显示在当前年份之后。
copyright = "MIT licensed demo content"

# 说说页面 JSON feed 的媒体类型。
[mediaTypes."application/feed+json"]
  suffixes = ["json"]

# 说说页面的 RSS 输出。
[outputFormats.TalksRSS]
  mediaType = "application/rss+xml"
  baseName = "talks"
  isPlainText = false
  notAlternative = true

# 说说页面的 JSON 输出。
[outputFormats.TalksJSON]
  mediaType = "application/feed+json"
  baseName = "talks"
  isPlainText = true
  notAlternative = true

# 分页大小。
[pagination]
  pagerSize = 8

# RSS 输出条数。
[services.rss]
  limit = 10

# URL 规则。
[permalinks]
  posts = "/article/:slug/"
  page = "/:slug/"
  talks = "/talks/:slug/"

# 多语言配置。
[languages]
  [languages.zh-cn]
    languageName = "简体中文"
    languageCode = "zh-CN"
    weight = 1
    title = "Pocket Notes"
    contentDir = "content"

    [languages.zh-cn.params]
      description = "一款适合个人长期写作的图文式主题"
      subtitle = "一款适合个人长期写作的图文式主题"
