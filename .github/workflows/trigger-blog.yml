name: Trigger Updates on lawtee.github.io

on:
  push:
    branches: [ main, master ]
    paths:
      - '**'
  workflow_dispatch:

jobs:
  trigger-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Check trigger type and prepare commit message
        id: prepare-msg
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "commit_msg='[Manual] Trigger update'" >> $GITHUB_OUTPUT
          else
            echo "commit_msg='Trigger update (${{ github.sha }})'" >> $GITHUB_OUTPUT
          fi

      - name: Dispatch event to lawtee.github.io
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const commitMsg = `${{ steps.prepare-msg.outputs.commit_msg }}`;
            try {
              await github.rest.repos.createDispatchEvent({
                owner: 'h2dcc',
                repo: 'lawtee.github.io',
                event_type: 'trigger-theme-submodule-update',
                client_payload: { message: commitMsg, sha: '${{ github.sha }}' }
              });
              console.log('✅ Dispatch event sent to lawtee.github.io successfully!');
            } catch (error) {
              console.error('❌ Error dispatching to lawtee.github.io:', error.message);
              process.exit(1);
            }
