{{ with .Site.Params.comments.twikoo }}
<section class="comments-card comments-card--twikoo">
    <div id="tcomment"></div>
    {{ $lang := cond (eq $.Site.Language.Lang "zh-cn") "zh-CN" "en-US" }}
    <script>
        window.__initTwikoo = function () {
            if (!window.twikoo || window.__twikooInitialized) return;
            window.__twikooInitialized = true;
            twikoo.init({
                envId: '{{ .envId }}',
                el: '#tcomment',
                lang: '{{ .lang | default $lang }}',
                path: '{{ .path | default $.RelPermalink }}',
                {{ with .region }}region: '{{ . }}',{{ end }}
            });
        };
    </script>
    <script src="{{ .jsUrl | default "https://cdn.jsdelivr.net/npm/twikoo@1.7.3/dist/twikoo.min.js" }}" defer onload="window.__initTwikoo && window.__initTwikoo()"></script>
</section>
{{ end }}
